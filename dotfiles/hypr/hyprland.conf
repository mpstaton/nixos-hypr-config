# ~/.config/hypr/hyprland.conf
#
# Your Hyprland config, brought over from the nixos-hypr-config repo
# (home/mps/home.nix), which is itself the de-Garuda'd port of your old
# garuda-hyprland-config/dotconfig/hypr/hyprland.conf.
#
# This is a plain, hand-placed config file. Home Manager is NOT managing it —
# edit it freely. If a keybind launches an app you haven't installed yet, that
# bind just does nothing; it won't stop Hyprland from starting.

###################
##### MONITORS ####
###################
# Laptop panel + external. Adjust names with `hyprctl monitors` if they differ.
monitor = eDP-1, 3840x2160@144.00101, 0x0, 1.33333
monitor = DP-2, disable
monitor = DP-3, 3840x2160@60, 3072x0, 1.5

$mainMod = SUPER

###################
#### AUTOSTART ####
###################
exec-once = nm-applet --indicator
exec-once = hypridle
exec-once = wpaperd
exec-once = waybar
exec-once = mako
exec-once = hyprpolkitagent
exec-once = foot --server
exec-once = wl-paste --type text --watch cliphist store
exec-once = wl-paste --type image --watch cliphist store

env = XDG_CURRENT_DESKTOP,Hyprland

###################
###### INPUT ######
###################
input {
    kb_layout = us
    numlock_by_default = true
    follow_mouse = 1
    sensitivity = 0
    touchpad {
        natural_scroll = true
        tap-to-click = true
        disable_while_typing = true
    }
}

###################
##### GENERAL #####
###################
general {
    gaps_in = 5
    gaps_out = 10
    border_size = 2
    col.active_border = rgba(33ccffee) rgba(8f00ffee) 45deg
    col.inactive_border = rgba(595959aa)
    layout = dwindle
}

decoration {
    rounding = 10
    blur {
        enabled = true
        size = 5
        passes = 1
    }
    shadow {
        enabled = true
        range = 4
        render_power = 3
        color = rgba(1a1a1aee)
    }
}

animations {
    enabled = true
    bezier = myBezier, 0.05, 0.9, 0.1, 1.05
    animation = windows, 1, 7, myBezier
    animation = windowsOut, 1, 7, default, popin 80%
    animation = border, 1, 10, default
    animation = fade, 1, 7, default
    animation = workspaces, 1, 6, default
}

dwindle {
    preserve_split = true
}

master {
    new_status = master
}

misc {
    disable_hyprland_logo = true
}

###################
### WINDOW RULES ##
###################
windowrule = match:title ^(kitty)$, float on
windowrule = match:title ^(thunar)$, opacity 0.85 override 0.85 override
windowrule = match:title ^(gedit)$, opacity 0.85 override 0.85 override
windowrule = match:title ^(catfish)$, opacity 0.85 override 0.85 override
windowrule = match:title ^(wofi)$, stay_focused on
windowrule = match:float true, opacity 0.85 0.85

layerrule = blur on, match:namespace waybar
layerrule = ignore_alpha 0, match:namespace waybar
layerrule = blur on, match:namespace wofi
layerrule = blur on, match:namespace gtk-layer-shell

###################
###### BINDS ######
###################
bind = SUPER, RETURN, exec, kitty -o 'font_size=13' --title ok_its_kitty
bind = CTRLALT, T, exec, kitty -o 'font_size=13' --title ok_its_kitty
bind = SUPER, T, exec, kitty --start-as=fullscreen -o 'font_size=18' --title all_is_kitty
bind = SUPER, I, exec, kitty --title ok_its_kitty --hold nmtui

bind = $mainMod SHIFT, R, exec, hyprctl reload
bind = $mainMod, Q, killactive,
bind = $mainMod SHIFT, E, exec, nwgbar
bind = $mainMod, N, exec, thunar
bind = $mainMod SHIFT, 65, togglefloating,
bind = $mainMod SHIFT, D, exec, nwg-drawer -mb 10 -mr 10 -ml 10 -mt 10
bind = $mainMod, P, pseudo,
bind = $mainMod SHIFT, P, layoutmsg, togglesplit

# Function-key app row
bind = $mainMod, F1, exec, firefox
bind = $mainMod, F2, exec, thunderbird
bind = $mainMod, F3, exec, thunar
bind = $mainMod, F4, exec, geany
bind = $mainMod, F5, exec, gitkraken
bind = $mainMod, F6, exec, gparted
bind = $mainMod, F7, exec, inkscape
bind = $mainMod, F8, exec, blender
bind = $mainMod, F9, exec, meld
bind = $mainMod, F10, exec, joplin-desktop
bind = $mainMod, F12, exec, galculator

# Focus movement
bind = $mainMod, left, movefocus, l
bind = $mainMod, H, movefocus, l
bind = $mainMod, right, movefocus, r
bind = $mainMod, L, movefocus, r
bind = $mainMod, up, movefocus, u
bind = $mainMod, K, movefocus, u
bind = $mainMod, down, movefocus, d
bind = $mainMod, J, movefocus, d

# Workspaces 1-10
bind = $mainMod, 1, workspace, 1
bind = $mainMod, 2, workspace, 2
bind = $mainMod, 3, workspace, 3
bind = $mainMod, 4, workspace, 4
bind = $mainMod, 5, workspace, 5
bind = $mainMod, 6, workspace, 6
bind = $mainMod, 7, workspace, 7
bind = $mainMod, 8, workspace, 8
bind = $mainMod, 9, workspace, 9
bind = $mainMod, 0, workspace, 10

# Move active window to workspace
bind = ALT SHIFT, 1, movetoworkspace, 1
bind = ALT SHIFT, 2, movetoworkspace, 2
bind = ALT SHIFT, 3, movetoworkspace, 3
bind = ALT SHIFT, 4, movetoworkspace, 4
bind = ALT SHIFT, 5, movetoworkspace, 5
bind = ALT SHIFT, 6, movetoworkspace, 6
bind = ALT SHIFT, 7, movetoworkspace, 7
bind = ALT SHIFT, 8, movetoworkspace, 8
bind = ALT SHIFT, 9, movetoworkspace, 9
bind = ALT SHIFT, 0, movetoworkspace, 10

# Move active window silently to workspace
bind = $mainMod SHIFT, 1, movetoworkspacesilent, 1
bind = $mainMod SHIFT, 2, movetoworkspacesilent, 2
bind = $mainMod SHIFT, 3, movetoworkspacesilent, 3
bind = $mainMod SHIFT, 4, movetoworkspacesilent, 4
bind = $mainMod SHIFT, 5, movetoworkspacesilent, 5
bind = $mainMod SHIFT, 6, movetoworkspacesilent, 6
bind = $mainMod SHIFT, 7, movetoworkspacesilent, 7
bind = $mainMod SHIFT, 8, movetoworkspacesilent, 8
bind = $mainMod SHIFT, 9, movetoworkspacesilent, 9
bind = $mainMod SHIFT, 0, movetoworkspacesilent, 10

bind = $mainMod, S, swapactiveworkspaces, eDP-1 DP-3
bind = $mainMod, mouse_down, workspace, e+1
bind = $mainMod, mouse_up, workspace, e-1

bind = $mainMod, O, exec, firefox
bind = $mainMod, M, fullscreen, 1
bind = $mainMod, F, fullscreen, 0
bind = $mainMod SHIFT, F, fullscreenstate, 0 2
bind = $mainMod SHIFT, C, exec, killall -9 wpaperd && wpaperd
bind = SUPER, V, exec, cliphist list | wofi --dmenu | cliphist decode | wl-copy

# Screenshots — hyprshot (capture) + satty (annotate). Saved to ~/Desktop/Screenshots AND copied to clipboard.
bind = , Print, exec, hyprshot -z -m region -o ~/Desktop/Screenshots          # select a region
bind = SHIFT, Print, exec, hyprshot -m output -o ~/Desktop/Screenshots         # whole monitor
bind = CTRL, Print, exec, hyprshot -z -m window -o ~/Desktop/Screenshots       # pick a window
bind = $mainMod, Print, exec, hyprshot -z -m region --raw | satty --filename - --output-filename ~/Desktop/Screenshots/satty_%Y%m%d-%H%M%S.png --copy-command wl-copy --early-exit   # region -> annotate in satty

# Old grim/slurp/swappy binds, kept as a fallback (uncomment to restore):
# bind = , Print, exec, grim -g "$(slurp)" - | swappy -f -
# bind = CTRL, Print, exec, ~/.config/hypr/scripts/screenshot_window.sh
# bind = SHIFT, Print, exec, ~/.config/hypr/scripts/screenshot_display.sh
# bind = $mainMod, Print, exec, mkdir -p ~/Pictures/Screenshots && grim ~/Pictures/Screenshots/screenshot-$(date +%Y%m%d-%H%M%S).png && notify-send 'Screenshot saved' -t 1500

bind = $mainMod, R, submap, resize

# Release-bind: tap SUPER alone to toggle wofi
bindr = SUPER, SUPER_L, exec, pkill wofi || wofi --normal-window --show drun --allow-images

# Repeatable media / volume / brightness keys
binde = ,122, exec, pamixer --decrease 5; notify-send ' Volume: '$(pamixer --get-volume) -t 500
binde = ,123, exec, pamixer --increase 5; notify-send ' Volume: '$(pamixer --get-volume) -t 500
binde = ,121, exec, pamixer --toggle-mute; notify-send ' Volume: Toggle-mute' -t 500
binde = ,XF86AudioMicMute, exec, pactl set-source-mute @DEFAULT_SOURCE@ toggle; notify-send 'System Mic: Toggle-mute' -t 500
binde = ,232, exec, brightnessctl -c backlight set 5%-
binde = ,233, exec, brightnessctl -c backlight set +5%
binde = ,172, exec, playerctl play-pause
binde = ,171, exec, playerctl next
binde = ,173, exec, playerctl previous

# Mouse move / resize
bindm = $mainMod, mouse:272, movewindow
bindm = $mainMod, mouse:273, resizewindow

###################
##### SUBMAPS #####
###################
submap = resize
binde = , right, resizeactive, 50 0
binde = , L, resizeactive, 50 0
binde = , left, resizeactive, -50 0
binde = , H, resizeactive, -50 0
binde = , up, resizeactive, 0 -50
binde = , K, resizeactive, 0 -50
binde = , down, resizeactive, 0 50
binde = , J, resizeactive, 0 50
bind = , escape, submap, reset
submap = reset
